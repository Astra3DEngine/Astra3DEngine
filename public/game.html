<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小游戏 - Astra 3D Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      text-align: center;
      padding: 40px;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #66ccff;
    }
    
    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }
    
    .hint {
      margin-top: 30px;
      padding: 12px 20px;
      background: rgba(102, 204, 255, 0.1);
      border-radius: 8px;
      font-size: 12px;
      color: #66ccff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎮</div>
    <h1>小游戏</h1>
    <p>游戏内容待开发...</p>
    <p>这里将是一个有趣的小游戏</p>
    <div class="hint">Alt + 点击 Logo 打开此窗口</div>
  </div>
</body>
</html>
