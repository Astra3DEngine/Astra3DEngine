name: Deploy Preview (develop)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Astra3DEngine
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          BASE_URL: /develop/

      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: Astra3DEngine/Astra3Dengine.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: gh-pages

      - name: Deploy to /develop/
        run: |
          cd gh-pages
          # 确保 CNAME 文件存在（自定义域名必须）
          echo "astra3d.cyberneko.cn" > CNAME
          # 禁用 Jekyll 处理（避免子路径 404 问题）
          touch .nojekyll
          # 清空目标目录（保留 .git）
          find develop -mindepth 1 -delete 2>/dev/null || mkdir -p develop
          # 复制构建产物
          cp -r $GITHUB_WORKSPACE/dist/* develop/
          # 提交并推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Deploy Astra3DEngine preview ${GITHUB_SHA:0:7}"
          git push
