name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 第一步：构建通用资源（只做一次）
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all assets
        run: pnpm run desktop:build -- --dir

      - name: Upload prepared assets
        uses: actions/upload-artifact@v4
        with:
          name: prepared-assets
          path: |
            dist/
            dist-electron/
            release/linux-unpacked/
            node_modules/
            package.json
            pnpm-lock.yaml
          retention-days: 1

  # 第二步：各平台独立打包（并行执行，各自为独立 job）
  build-windows:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared assets
        uses: actions/download-artifact@v4
        with:
          name: prepared-assets
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package Windows x64 NSIS
        run: npx electron-builder --win --x64 --nsis

      - name: Package Windows ia32 NSIS
        run: npx electron-builder --win --ia32 --nsis

      - name: Package Windows x64 Portable
        run: npx electron-builder --win --x64 --portable

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/*
          retention-days: 1

  build-macos:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared assets
        uses: actions/download-artifact@v4
        with:
          name: prepared-assets
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package macOS x64 DMG
        run: npx electron-builder --mac --x64 --dmg

      - name: Package macOS arm64 DMG
        run: npx electron-builder --mac --arm64 --dmg

      - name: Package macOS universal DMG
        run: npx electron-builder --mac --universal --dmg

      - name: Package macOS x64 ZIP
        run: npx electron-builder --mac --x64 --zip

      - name: Package macOS arm64 ZIP
        run: npx electron-builder --mac --arm64 --zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*
          retention-days: 1

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared assets
        uses: actions/download-artifact@v4
        with:
          name: prepared-assets
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package Linux AppImage
        run: npx electron-builder --linux --x64 --AppImage

      - name: Package Linux deb
        run: npx electron-builder --linux --x64 --deb

      - name: Package Linux tar.gz
        run: npx electron-builder --linux --x64 --tar.gz

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*
          retention-days: 1

  # 第三步：合并所有产物，创建 Release
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: artifacts

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: artifacts

      - name: List release artifacts
        run: ls -lh artifacts/

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Astra3DEngine ${{ steps.version.outputs.tag }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
