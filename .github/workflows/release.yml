name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ==========================================
  # 统一构建阶段（只做一次）
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build --config vite.config.desktop.js

      - name: Generate icons
        run: pnpm run icon:generate

      - name: Build electron main/preload
        run: |
          npx vite build --config vite.config.desktop.js --outDir dist-electron || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            dist-electron/
            package.json
            pnpm-lock.yaml
            electron/
          retention-days: 1

  # ==========================================
  # Linux 打包
  # ==========================================
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: AppImage
            args: '--linux AppImage --x64'
          - target: deb
            args: '--linux deb --x64'
          - target: tar.gz
            args: '--linux tar.gz --x64'
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Package Linux ${{ matrix.target }}
        run: pnpm exec electron-builder ${{ matrix.args }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: release/*
          retention-days: 1

  # ==========================================
  # macOS 打包
  # ==========================================
  package-mac:
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: dmg-x64
            args: '--mac --x64'
          - target: dmg-arm64
            args: '--mac --arm64'
          - target: dmg-universal
            args: '--mac --universal'
          - target: zip-x64
            args: '--mac zip --x64'
          - target: zip-arm64
            args: '--mac zip --arm64'
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Package macOS ${{ matrix.target }}
        run: pnpm exec electron-builder ${{ matrix.args }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.target }}
          path: release/*
          retention-days: 1

  # ==========================================
  # Windows 打包
  # ==========================================
  package-windows:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: nsis-x64
            args: '--win --x64'
          - target: nsis-ia32
            args: '--win --ia32'
          - target: portable-x64
            args: '--win portable --x64'
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Package Windows ${{ matrix.target }}
        run: pnpm exec electron-builder ${{ matrix.args }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: release/*
          retention-days: 1

  # ==========================================
  # 发布阶段
  # ==========================================
  release:
    needs: [package-linux, package-mac, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-*'
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh artifacts/

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Astra3DEngine ${{ steps.version.outputs.tag }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true