name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ==========================================
  # 统一构建阶段（只做一次）
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update package.json version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Updating package.json version to ${VERSION}"
          jq ".version = \"${VERSION}\"" package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Build web assets
        run: pnpm run build --config vite.config.desktop.js

      - name: Generate icons
        run: pnpm run icon:generate

      - name: Build electron main/preload
        run: |
          npx vite build --config vite.config.desktop.js --outDir dist-electron || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            dist-electron/
            package.json
            pnpm-lock.yaml
            electron/
          retention-days: 1

  # ==========================================
  # Linux 打包
  # ==========================================
  package-linux:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: AppImage
            args: '--linux AppImage --x64'
          - target: deb
            args: '--linux deb --x64'
          - target: tar.gz
            args: '--linux tar.gz --x64'
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Package Linux ${{ matrix.target }}
        run: pnpm exec electron-builder ${{ matrix.args }} --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: release/*
          retention-days: 1

  # ==========================================
  # macOS 打包
  # ==========================================
  package-mac:
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: dmg-x64
            args: '--mac --x64'
          - target: dmg-arm64
            args: '--mac --arm64'
          - target: dmg-universal
            args: '--mac --universal'
          - target: zip-x64
            args: '--mac zip --x64'
          - target: zip-arm64
            args: '--mac zip --arm64'
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate icons (macOS)
        run: pnpm run icon:generate

      - name: Package macOS ${{ matrix.target }}
        run: pnpm exec electron-builder ${{ matrix.args }} --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.target }}
          path: release/*
          retention-days: 1

  # ==========================================
  # Windows 打包
  # ==========================================
  package-windows:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: nsis-x64
            args: '--win --x64'
          - target: nsis-ia32
            args: '--win --ia32'
          - target: portable-x64
            args: '--win portable --x64'
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Package Windows ${{ matrix.target }}
        run: pnpm exec electron-builder ${{ matrix.args }} --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: release/*
          retention-days: 1

  # ==========================================
  # 发布阶段
  # ==========================================
  release:
    needs: [package-linux, package-mac, package-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-*'
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh artifacts/

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate version.json
        id: generate_version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"
          
          # 收集所有文件名
          cd artifacts
          
          # Windows 文件
          WIN_SETUP_X64=$(ls *windows*x64*setup*.exe 2>/dev/null | head -1 || echo "")
          WIN_SETUP_IA32=$(ls *windows*ia32*setup*.exe 2>/dev/null | head -1 || echo "")
          WIN_PORTABLE_X64=$(ls *windows*x64*portable*.exe 2>/dev/null | head -1 || echo "")
          
          # macOS 文件
          MAC_DMG_X64=$(ls *macos*x64*.dmg 2>/dev/null | head -1 || echo "")
          MAC_DMG_ARM64=$(ls *macos*arm64*.dmg 2>/dev/null | head -1 || echo "")
          MAC_ZIP_X64=$(ls *macos*x64*.zip 2>/dev/null | head -1 || echo "")
          MAC_ZIP_ARM64=$(ls *macos*arm64*.zip 2>/dev/null | head -1 || echo "")
          
          # Linux 文件
          LINUX_APPIMAGE_X64=$(ls *linux*x64*.AppImage 2>/dev/null | head -1 || echo "")
          LINUX_DEB_X64=$(ls *linux*x64*.deb 2>/dev/null | head -1 || echo "")
          LINUX_TARBALL_X64=$(ls *linux*x64*.tar.gz 2>/dev/null | head -1 || echo "")
          
          # 生成 version.json
          cat > version.json << EOF
          {
            "latest": "${VERSION}",
            "tag": "${TAG}",
            "assets": {
              "windows": {
                "setup": {
                  "x64": "${WIN_SETUP_X64}",
                  "ia32": "${WIN_SETUP_IA32}"
                },
                "portable": {
                  "x64": "${WIN_PORTABLE_X64}"
                }
              },
              "macos": {
                "dmg": {
                  "x64": "${MAC_DMG_X64}",
                  "arm64": "${MAC_DMG_ARM64}"
                },
                "zip": {
                  "x64": "${MAC_ZIP_X64}",
                  "arm64": "${MAC_ZIP_ARM64}"
                }
              },
              "linux": {
                "appimage": {
                  "x64": "${LINUX_APPIMAGE_X64}"
                },
                "deb": {
                  "x64": "${LINUX_DEB_X64}"
                },
                "tarball": {
                  "x64": "${LINUX_TARBALL_X64}"
                }
              }
            },
            "download_base": "https://github.com/Astra3DEngine/Astra3DEngine/releases/download"
          }
          EOF
          
          echo "Generated version.json:"
          cat version.json
          
          # 保存文件路径供后续使用
          echo "version_json_path=$(pwd)/version.json" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Astra3DEngine ${{ steps.version.outputs.tag }}
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.tar.gz
            artifacts/*.AppImage
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Push version.json to website repo
        run: |
          # Clone website repo
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/Astra3DEngine/astra3dengine.github.io.git website
          
          # Copy version.json
          cp artifacts/version.json website/version.json
          
          # Commit and push
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "Update version.json for ${{ steps.version.outputs.tag }}" || echo "No changes to commit"
          git push